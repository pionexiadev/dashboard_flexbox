<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Dashboard Flexbox</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div id="app">

            <div class="body">

                <div class="table">

                    </div>

                        <div class="cell">Ait Hammou Idriss</div>

                    </div>
